name: Meroshare IPO filler

on:
    schedule:
        - cron: '15 6 * * 1,2,3,4,5'
    workflow_dispatch:

defaults:
    run:
        shell: bash

jobs:
    IPOFiller:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                python-version: ['3.11']

        env:
            User: ${{ secrets.USER }}
            cptl: ${{ secrets.CPTL }}
            ClientID: ${{ secrets.CLIENTID }}
            Password: ${{ secrets.PASSWORD }}
            MPin: ${{ secrets.MPIN }}
            CRN: ${{ secrets.CRN }}
            URL: ${{ secrets.URL }}
            WEBHOOK_TOKEN: ${{ secrets.WEBHOOK_TOKEN }}

            base_url : ${{ secrets.base_url }}
            LOGIN_PATH : ${{ secrets.LOGIN_PATH }}
            LOGOUT_PATH : ${{ secrets.LOGOUT_PATH }}
            PW_CHANGE_PATH : ${{ secrets.PW_CHANGE_PATH }}
            DEFAULT_TASK_PATH : ${{ secrets.DEFAULT_TASK_PATH }}
            REAPPLY_TASK_PATH : ${{ secrets.REAPPLY_TASK_PATH }}
            root_clientId : ${{ secrets.root_clientId }}
            root_password : ${{ secrets.root_password }}
            root_username : ${{ secrets.root_username }}
            default_kitta : ${{ secrets.default_kitta }}
            default_price_limit : ${{ secrets.default_price_limit }}
            applicable_path : ${{ secrets.applicable_path }}
            issues_path : ${{ secrets.issues_path }}
            ownDetail_path : ${{ secrets.ownDetail_path }}
            bank_path : ${{ secrets.bank_path }}
            mybank_path : ${{ secrets.mybank_path }}
            canApply_path : ${{ secrets.canApply_path }}
            company_path : ${{ secrets.company_path }}
            reapply_details_path : ${{ secrets.reapply_details_path }}
            pin_change_path : ${{ secrets.pin_change_path }}
            
            SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
            GCP_CREDENTIALS_B64: ${{ secrets.GCP_CREDENTIALS_B64 }}
            TZ: 'Asia/Kathmandu'

        steps:
            - name: checkout repo into runner
              uses: actions/checkout@v4
            - name: Setup Chrome
              uses: browser-actions/setup-chrome@v1
            - name: Setup Chromedriver
              uses: nanasess/setup-chromedriver@v2
            - name: set-up python base environment
              uses: actions/setup-python@v4
              with:
                python-version: ${{ matrix.python-version }}
            - name: Install Necessary Dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt
            - name: Decode GCP credentials
              run: |
                echo "$GCP_CREDENTIALS_B64" | base64 --decode > credentials.json
            - name: Fill up process
              run: python ./financeBot.py
